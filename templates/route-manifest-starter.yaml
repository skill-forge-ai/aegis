# Route Manifest — Contract Artifact
# Aegis Layer 2: Consumer-Driven Route Coverage
#
# This manifest declares every API route the frontend consumes.
# Backend CI validates that every listed route has:
#   1. A registered backend handler
#   2. A corresponding integration test
#
# Usage:
#   - Monorepo: auto-generated by `scripts/verify-route-coverage.sh` scanning frontend code
#   - Multi-Repo, Single Agent: Lead generates from frontend scan, copies to backend repo
#   - Cross-Agent, Cross-Workspace: Frontend agent MUST export this as `consumer-routes.yaml`
#     into the contract repo. Backend CI validates coverage against it.
#
# Place in: contracts/route-manifest.yaml

routes:
  # Example entries — replace with actual routes from your frontend
  #
  # - method: GET
  #   path: /api/customers
  #   description: Paginated customer list
  #   consumer: frontend
  #   provider: backend
  #   tested: false  # Set to true once integration test exists
  #
  # - method: POST
  #   path: /api/customers
  #   description: Create a new customer
  #   consumer: frontend
  #   provider: backend
  #   tested: false

  - method: GET
    path: /api/example
    description: Example endpoint — replace with real routes
    consumer: frontend
    provider: backend
    tested: false

# Metadata
metadata:
  generated_by: manual  # or "verify-route-coverage.sh"
  generated_at: null     # ISO 8601 timestamp when auto-generated
  frontend_source: null  # Path to frontend API client file(s) scanned
  architecture_mode: monorepo  # monorepo | multi-repo | cross-workspace
